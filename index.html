<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lithilas CP RUSH</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Prevent accidental text selection when tapping buttons rapidly */
        body { user-select: none; -webkit-user-select: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-200 text-gray-900 font-sans h-screen flex justify-center items-center">

    <div id="app" class="bg-white w-full max-w-md h-full sm:h-[800px] sm:rounded-2xl shadow-2xl flex flex-col relative overflow-hidden">
        
        <!-- ROLE SELECTION SCREEN -->
        <div id="screen-role" class="flex flex-col items-center justify-center h-full p-6 text-center">
            <h1 class="text-3xl font-bold mb-8">LITHILAS: CP RUSH</h1>
            <p class="mb-4 text-lg">Pasirinkite savo rolę:</p>
            <button onclick="selectRole('main')" class="w-full bg-blue-600 text-white py-4 rounded-xl text-xl font-bold mb-4 active:bg-blue-700">⚔️ PUOLĖJAS (Main)</button>
            <button onclick="selectRole('view')" class="w-full bg-red-600 text-white py-4 rounded-xl text-xl font-bold active:bg-red-700">🛡️ GYNĖJAS (View)</button>
        </div>

        <!-- MAIN (ATTACKER) SETUP SCREEN -->
        <div id="screen-setup" class="hidden flex-col items-center justify-center h-full p-6 text-center">
            <h2 class="text-2xl font-bold mb-8">Puolėjų nustatymai</h2>
            <p class="mb-2">Komandos spalva:</p>
            <div class="flex gap-4 mb-12 w-full">
                <button id="btn-color-red" onclick="setColor('Red')" class="flex-1 bg-red-500 text-white py-3 rounded-lg border-4 border-gray-800">Raudona</button>
                <button id="btn-color-blue" onclick="setColor('Blue')" class="flex-1 bg-gray-400 text-white py-3 rounded-lg border-4 border-transparent">Mėlyna</button>
            </div>
            <button onclick="startGame(false)" class="w-full bg-green-500 text-white py-4 rounded-xl text-xl font-bold mb-4 active:bg-green-600">Start (Normal)</button>
            <button onclick="startGame(true)" class="w-full bg-purple-600 text-white py-4 rounded-xl text-lg font-bold active:bg-purple-700">Pradėti Demo (3-2-1 min)</button>
        </div>

        <!-- ACTIVE GAME SCREEN -->
        <div id="screen-game" class="hidden flex-col h-full p-4 relative">
            
            <div class="flex justify-between items-center mb-6">
                <div class="text-lg font-bold">Laikas: <span id="ui-main-timer" class="text-xl">00:00:00</span></div>
                <button id="btn-pause" onclick="togglePause()" class="hidden bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">PAUZĖ</button>
            </div>

            <!-- Defender Shields -->
            <div id="view-shields" class="hidden w-full bg-gray-100 p-4 rounded-xl mb-4 text-center border-2 border-red-500">
                <h3 class="font-bold text-red-600 mb-2">Gynėjų statusas</h3>
                <div class="flex justify-center gap-2 text-3xl">
                    <span id="shield-1" class="opacity-30 grayscale">🛡️</span>
                    <span id="shield-2" class="opacity-30 grayscale">🛡️</span>
                </div>
                <p id="shield-text" class="text-sm mt-2 font-semibold">Puolėjai dar neužėmė 1 CP</p>
            </div>

            <!-- Dynamic Status Area -->
            <div class="flex-1 flex flex-col items-center justify-center text-center">
                <h2 id="ui-status-title" class="text-2xl font-bold mb-4 uppercase text-gray-900">Keliaukite prie 1 CP</h2>
                
                <div id="ui-cp-timer-container" class="hidden flex-col items-center mb-8">
                    <p class="text-xl">Likęs laikas:</p>
                    <p id="ui-cp-timer" class="text-4xl font-bold font-mono my-2">00:00</p>
                    <p id="ui-speed" class="text-gray-500">Laiko greitis: 1x</p>
                </div>

                <!-- Defender Radar Info -->
                <p id="ui-defender-info" class="hidden text-xl text-red-600 font-bold mb-4"></p>

                <!-- Attacker Buttons -->
                <button id="btn-proceed" onclick="proceedNextState()" class="hidden w-full bg-blue-600 text-white py-4 rounded-xl text-lg font-bold mt-8">Pradėti užėmimą</button>
                
                <div id="btn-accelerate" class="hidden w-full h-64 bg-gray-400 mt-auto rounded-xl flex items-center justify-center cursor-pointer touch-none select-none">
                    <span id="btn-accelerate-text" class="text-white text-3xl font-bold">PAGREITINTI</span>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGhi4XMLeVGnRq3dhhwbJK9NOCtIPJ9vs",
            authDomain: "cprush-2249a.firebaseapp.com",
            projectId: "cprush-2249a",
            storageBucket: "cprush-2249a.firebasestorage.app",
            messagingSenderId: "40928992118",
            appId: "1:40928992118:web:86c09b9eab9d9539c67857",
            measurementId: "G-7N5M3W4ZYB",
            databaseURL: "https://cprush-2249a-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);
        const gameRef = ref(db, 'gameState');

        const States = {
            MAIN: 'MAIN',
            PRE_CP_1: 'PRE_CONTROL_POINT_1',
            CP_1: 'CONTROL_POINT_1',
            PRE_CP_2: 'PRE_CONTROL_POINT_2',
            CP_2: 'CONTROL_POINT_2',
            BASE_CAPTURED: 'BASE_CAPTURED',
            PRE_CP_3: 'PRE_CONTROL_POINT_3',
            CP_3: 'CONTROL_POINT_3',
            VICTORY: 'VICTORY',
            GAME_OVER: 'GAME_OVER'
        };

        let userRole = null;
        let gameLoop = null;

        // Default initial state
        let state = {
            status: States.MAIN,
            mainTime: 105 * 60,
            cpTime: 0,
            isPaused: false,
            isDemo: false,
            teamColor: 'Red',
            isPressed: false
        };

        const screens = {
            role: document.getElementById('screen-role'),
            setup: document.getElementById('screen-setup'),
            game: document.getElementById('screen-game')
        };

        window.selectRole = (role) => {
            userRole = role;
            screens.role.classList.add('hidden');
            
            if (role === 'main') {
                screens.setup.classList.remove('hidden');
                screens.setup.classList.add('flex');
            } else {
                screens.game.classList.remove('hidden');
                screens.game.classList.add('flex');
                document.getElementById('view-shields').classList.remove('hidden');
                
                // Immediately render the default state (1:45:00) so it doesn't show 00:00:00
                renderUI(); 
                listenToFirebase(); 
            }
        };

        window.setColor = (color) => {
            state.teamColor = color;
            document.getElementById('btn-color-red').classList.replace(color === 'Red' ? 'border-transparent' : 'border-gray-800', color === 'Red' ? 'border-gray-800' : 'border-transparent');
            document.getElementById('btn-color-red').classList.replace(color === 'Red' ? 'bg-gray-400' : 'bg-red-500', color === 'Red' ? 'bg-red-500' : 'bg-gray-400');
            
            document.getElementById('btn-color-blue').classList.replace(color === 'Blue' ? 'border-transparent' : 'border-gray-800', color === 'Blue' ? 'border-gray-800' : 'border-transparent');
            document.getElementById('btn-color-blue').classList.replace(color === 'Blue' ? 'bg-gray-400' : 'bg-blue-500', color === 'Blue' ? 'bg-blue-500' : 'bg-gray-400');
        };

        window.startGame = (isDemo) => {
            state.isDemo = isDemo;
            state.mainTime = 105 * 60;
            state.status = States.PRE_CP_1;
            state.isPaused = false;
            
            screens.setup.classList.add('hidden');
            screens.setup.classList.remove('flex');
            screens.game.classList.remove('hidden');
            screens.game.classList.add('flex');
            
            document.getElementById('btn-pause').classList.remove('hidden');
            
            startAttackerLoop();
        };

        window.togglePause = () => {
            state.isPaused = !state.isPaused;
            const btn = document.getElementById('btn-pause');
            btn.innerText = state.isPaused ? "TĘSTI" : "PAUZĖ";
            btn.className = state.isPaused ? "bg-red-600 text-white px-4 py-2 rounded-lg font-bold" : "bg-blue-600 text-white px-4 py-2 rounded-lg font-bold";
            updateFirebase();
            renderUI();
        };

        window.proceedNextState = () => {
            if (state.status === States.PRE_CP_1) {
                state.status = States.CP_1;
                state.cpTime = (state.isDemo ? 3 : 30) * 60;
            } else if (state.status === States.PRE_CP_2) {
                state.status = States.CP_2;
                state.cpTime = (state.isDemo ? 2 : 20) * 60;
            } else if (state.status === States.BASE_CAPTURED) {
                state.status = States.PRE_CP_3;
            } else if (state.status === States.PRE_CP_3) {
                state.status = States.CP_3;
                state.cpTime = (state.isDemo ? 1 : 10) * 60;
            }
            updateFirebase();
            renderUI();
        };

        const accBtn = document.getElementById('btn-accelerate');
        
        const pressStart = (e) => {
            if(e) e.preventDefault();
            if(state.isPaused) return;
            state.isPressed = true;
            accBtn.style.backgroundColor = state.teamColor === 'Red' ? '#ef4444' : '#3b82f6';
            document.getElementById('btn-accelerate-text').innerText = "GREIČIAU!";
            updateFirebase();
        };
        const pressEnd = (e) => {
            if(e) e.preventDefault();
            state.isPressed = false;
            accBtn.style.backgroundColor = '#9ca3af'; 
            document.getElementById('btn-accelerate-text').innerText = state.isPaused ? "PAUZĖ" : "PAGREITINTI";
            updateFirebase();
        };

        accBtn.addEventListener('mousedown', pressStart);
        accBtn.addEventListener('touchstart', pressStart);
        window.addEventListener('mouseup', pressEnd);
        window.addEventListener('touchend', pressEnd);

        function startAttackerLoop() {
            let tick = 0;
            gameLoop = setInterval(() => {
                if (state.status === States.VICTORY || state.status === States.GAME_OVER) return;

                if (!state.isPaused) {
                    tick++;
                    if (tick % 2 === 0 && state.mainTime > 0) {
                        state.mainTime--;
                    }

                    if (state.mainTime <= 0 && state.status !== States.VICTORY) {
                        state.status = States.GAME_OVER;
                    }

                    if (state.status.startsWith('CONTROL_POINT') && state.cpTime > 0) {
                        if (state.isPressed || tick % 2 === 0) {
                            state.cpTime--;
                        }

                        if (state.cpTime <= 0) {
                            if (state.status === States.CP_1) state.status = States.PRE_CP_2;
                            else if (state.status === States.CP_2) state.status = States.BASE_CAPTURED;
                            else if (state.status === States.CP_3) state.status = States.VICTORY;
                        }
                    }
                }
                updateFirebase();
                renderUI();
            }, 500); 
        }

        function updateFirebase() {
            if (userRole === 'main') {
                set(gameRef, state).catch(error => console.error(error));
            }
        }

        function listenToFirebase() {
            onValue(gameRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    state = data;
                }
                // Call render even if data is null, to keep UI from breaking
                renderUI();
            });
        }

        function formatTime(totalSeconds) {
            if (isNaN(totalSeconds) || totalSeconds < 0) return "00:00:00";
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        
        function formatCPTime(totalSeconds) {
            if (isNaN(totalSeconds) || totalSeconds < 0) return "00:00";
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function renderUI() {
            const title = document.getElementById('ui-status-title');
            
            // Reset text color (in case game was restarted after a win/loss)
            title.className = "text-2xl font-bold mb-4 uppercase text-gray-900";

            // Fallbacks to 0 if data is missing
            const currentMainTime = state.mainTime || 0;
            const currentCpTime = state.cpTime || 0;

            document.getElementById('ui-main-timer').innerText = formatTime(currentMainTime);
            document.getElementById('ui-cp-timer').innerText = formatCPTime(currentCpTime);
            document.getElementById('ui-speed').innerText = `Laiko greitis: ${state.isPressed && !state.isPaused ? '2x' : '1x'}`;

            const cpContainer = document.getElementById('ui-cp-timer-container');
            const proceedBtn = document.getElementById('btn-proceed');
            const accBtnUI = document.getElementById('btn-accelerate');
            const defenderInfo = document.getElementById('ui-defender-info');

            cpContainer.classList.add('hidden');
            proceedBtn.classList.add('hidden');
            accBtnUI.classList.add('hidden');
            defenderInfo.classList.add('hidden');

            if (state.isPaused && userRole === 'main') {
                document.getElementById('btn-accelerate-text').innerText = "PAUZĖ";
                accBtnUI.style.backgroundColor = '#9ca3af';
            }

            switch (state.status) {
                case States.MAIN:
                    title.innerText = "LAUKIAMAS STARTAS...";
                    if (userRole === 'view') { 
                        defenderInfo.innerText = "Puolėjai dar nepradėjo žaidimo."; 
                        defenderInfo.classList.remove('hidden'); 
                    }
                    break;
                case States.PRE_CP_1:
                    title.innerText = "Keliaukite prie 1 KONTROLINIO TAŠKO";
                    if (userRole === 'main') { proceedBtn.innerText = "Pradėti 1 taško užėmimą"; proceedBtn.classList.remove('hidden'); }
                    else { defenderInfo.innerText = "Puolėjai keliauja prie 1 CP"; defenderInfo.classList.remove('hidden'); }
                    break;
                case States.CP_1:
                    title.innerText = "1 KONTROLINIS TAŠKAS";
                    cpContainer.classList.remove('hidden');
                    cpContainer.classList.add('flex');
                    if (userRole === 'main') accBtnUI.classList.remove('hidden');
                    else { defenderInfo.innerText = "⚠️ PUOLĖJAI UŽIMINĖJA 1 CP!"; defenderInfo.classList.remove('hidden'); }
                    break;
                case States.PRE_CP_2:
                    title.innerText = "Keliaukite prie 2 KONTROLINIO TAŠKO";
                    if (userRole === 'main') { proceedBtn.innerText = "Pradėti 2 taško užėmimą"; proceedBtn.classList.remove('hidden'); }
                    else { defenderInfo.innerText = "Puolėjai keliauja prie 2 CP"; defenderInfo.classList.remove('hidden'); }
                    break;
                case States.CP_2:
                    title.innerText = "2 KONTROLINIS TAŠKAS";
                    cpContainer.classList.remove('hidden');
                    cpContainer.classList.add('flex');
                    if (userRole === 'main') accBtnUI.classList.remove('hidden');
                    else { defenderInfo.innerText = "⚠️ PUOLĖJAI UŽIMINĖJA 2 CP!"; defenderInfo.classList.remove('hidden'); }
                    break;
                case States.BASE_CAPTURED:
                    title.innerText = "JŪSŲ BAZĖ DABAR YRA 1 CP";
                    if (userRole === 'main') { proceedBtn.innerText = "Tęsti į 3 CP"; proceedBtn.classList.remove('hidden'); }
                    else { defenderInfo.innerText = "Puolėjai užėmė 2 CP!"; defenderInfo.classList.remove('hidden'); }
                    break;
                case States.PRE_CP_3:
                    title.innerText = "Keliaukite prie 3 KONTROLINIO TAŠKO";
                    if (userRole === 'main') { proceedBtn.innerText = "Pradėti 3 taško užėmimą"; proceedBtn.classList.remove('hidden'); }
                    else { defenderInfo.innerText = "Puolėjai keliauja prie 3 CP (Finalas)"; defenderInfo.classList.remove('hidden'); }
                    break;
                case States.CP_3:
                    title.innerText = "3 KONTROLINIS TAŠKAS";
                    cpContainer.classList.remove('hidden');
                    cpContainer.classList.add('flex');
                    if (userRole === 'main') accBtnUI.classList.remove('hidden');
                    else { defenderInfo.innerText = "🚨 PUOLĖJAI UŽIMINĖJA FINALINĮ TAŠKĄ!"; defenderInfo.classList.remove('hidden'); }
                    break;
                case States.VICTORY:
                    title.innerText = "SVEIKINAME!\nPuolėjai laimėjo!";
                    title.className = "text-3xl font-bold mb-4 text-green-600";
                    break;
                case States.GAME_OVER:
                    title.innerText = "PRALAIMĖJOTE!\nLaikas baigėsi (Gynėjai laimėjo)";
                    title.className = "text-3xl font-bold mb-4 text-red-600";
                    break;
            }

            if (userRole === 'view') {
                const s1 = document.getElementById('shield-1');
                const s2 = document.getElementById('shield-2');
                const text = document.getElementById('shield-text');
                
                s1.classList.add('opacity-30', 'grayscale');
                s2.classList.add('opacity-30', 'grayscale');

                if ([States.PRE_CP_2, States.CP_2].includes(state.status)) {
                    s1.classList.remove('opacity-30', 'grayscale');
                    text.innerText = "Aktyvus 1 skydas (Prarastas 1 CP)";
                } else if ([States.BASE_CAPTURED, States.PRE_CP_3, States.CP_3, States.VICTORY].includes(state.status)) {
                    s1.classList.remove('opacity-30', 'grayscale');
                    s2.classList.remove('opacity-30', 'grayscale');
                    text.innerText = "Aktyvūs 2 skydai! (Prarasti 2 CP)";
                } else if (state.status === States.GAME_OVER) {
                    text.innerText = "ŽAIDIMAS BAIGTAS";
                } else if (state.status === States.MAIN) {
                    text.innerText = "Laukiama žaidėjų";
                } else {
                    text.innerText = "Puolėjai dar neužėmė 1 CP";
                }
            }
        }
    </script>
</body>
</html>
